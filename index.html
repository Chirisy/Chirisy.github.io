<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Chirisy 的个人网站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Chirisy 的个人网站，记录技术笔记、项目实践和学习教程。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="assets/docsify/vue.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Chirisy',
      repo: 'Chirisy/Chirisy.github.io',
      homepage: 'README.md',
      maxLevel: 4,
      // loadSidebar: true,
      loadNavbar: true,
      // relativePath: true,
      alias: {
        '/.*/_navbar.md': '/_navbar.md'
      },
      subMaxLevel: 2,
      auto2top: true,
      notFoundPage: true,
      mergeNavbar: true,
      search: {
        paths: 'auto',
        placeholder: '🔍 搜索',
        noData: '😒 找不到结果',
        // Headline depth, 1 - 6
        depth: 6,
        maxAge: 86400000, // timeout
      },
      footer: {
        copy: 'Make each day count And Towards happiness ',
        pre: '<hr/>',
        style: 'text-align: left;',
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      }
    }
  </script>
  <script src="assets/docsify/docsify.min.js"></script>
  <script src="assets/docsify/search.min.js"></script>
  <script src="assets/docsify/docsify-copy-code.min.js"></script>
  <script src="assets/docsify/docsify-pagination.min.js"></script>
</body>
</html>
